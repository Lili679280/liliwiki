<script>
document.addEventListener('DOMContentLoaded', function() {
  // Only add share buttons on article/post pages
  var article = document.querySelector('article.main-article') || document.querySelector('.article-content') || document.querySelector('article');
  if (!article) return;
  // Skip non-post pages (home, archive, search)
  if (window.location.pathname === '/' || window.location.pathname.indexOf('/page/') === 0) return;

  var title = document.title;
  var url = window.location.href;
  var encodedTitle = encodeURIComponent(title);
  var encodedUrl = encodeURIComponent(url);

  var shareDiv = document.createElement('div');
  shareDiv.className = 'article-share';
  shareDiv.innerHTML =
    '<span class="share-label">\u5206\u4EAB\u672C\u6587</span>' +
    '<div class="share-buttons">' +
    '<a href="https://twitter.com/intent/tweet?text=' + encodedTitle + '&url=' + encodedUrl + '" target="_blank" rel="noopener" class="share-btn share-twitter" title="\u5206\u4EAB\u5230 Twitter/X">\uD835\uDD4F</a>' +
    '<a href="https://service.weibo.com/share/share.php?title=' + encodedTitle + '&url=' + encodedUrl + '" target="_blank" rel="noopener" class="share-btn share-weibo" title="\u5206\u4EAB\u5230\u5FAE\u535A">\u5FAE\u535A</a>' +
    '<a href="https://connect.qq.com/widget/shareqq/index.html?title=' + encodedTitle + '&url=' + encodedUrl + '" target="_blank" rel="noopener" class="share-btn share-qq" title="\u5206\u4EAB\u5230 QQ">QQ</a>' +
    '<button class="share-btn share-copy" title="\u590D\u5236\u94FE\u63A5" id="copyLinkBtn">\u590D\u5236\u94FE\u63A5</button>' +
    '</div>';

  // Insert before comments section or after article
  var comments = document.getElementById('comments') || document.querySelector('.article-comments');
  if (comments) {
    comments.parentNode.insertBefore(shareDiv, comments);
  } else {
    article.parentNode.insertBefore(shareDiv, article.nextSibling);
  }

  document.getElementById('copyLinkBtn').addEventListener('click', function() {
    var btn = this;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(function() {
        btn.textContent = '\u5DF2\u590D\u5236 \u2713';
        setTimeout(function() { btn.textContent = '\u590D\u5236\u94FE\u63A5'; }, 2000);
      });
    } else {
      var input = document.createElement('input');
      input.value = url;
      document.body.appendChild(input);
      input.select();
      document.execCommand('copy');
      document.body.removeChild(input);
      btn.textContent = '\u5DF2\u590D\u5236 \u2713';
      setTimeout(function() { btn.textContent = '\u590D\u5236\u94FE\u63A5'; }, 2000);
    }
  });
});
</script>
