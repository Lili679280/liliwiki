<script>
(function() {
  // Only add share buttons on article pages
  var article = document.querySelector('article.main-article');
  if (!article) return;

  var title = document.title;
  var url = window.location.href;
  var encodedTitle = encodeURIComponent(title);
  var encodedUrl = encodeURIComponent(url);

  var shareHtml = '<div class="article-share">' +
    '<span class="share-label">分享本文</span>' +
    '<div class="share-buttons">' +
    '<a href="https://twitter.com/intent/tweet?text=' + encodedTitle + '&url=' + encodedUrl + '" target="_blank" rel="noopener" class="share-btn share-twitter" title="分享到 Twitter/X">𝕏</a>' +
    '<a href="https://service.weibo.com/share/share.php?title=' + encodedTitle + '&url=' + encodedUrl + '" target="_blank" rel="noopener" class="share-btn share-weibo" title="分享到微博">微博</a>' +
    '<a href="https://connect.qq.com/widget/shareqq/index.html?title=' + encodedTitle + '&url=' + encodedUrl + '" target="_blank" rel="noopener" class="share-btn share-qq" title="分享到 QQ">QQ</a>' +
    '<button class="share-btn share-copy" title="复制链接" onclick="copyArticleLink()">复制链接</button>' +
    '</div></div>';

  // Insert before comments section or at end of article
  var comments = document.getElementById('comments');
  if (comments) {
    comments.insertAdjacentHTML('beforebegin', shareHtml);
  } else {
    article.insertAdjacentHTML('beforeend', shareHtml);
  }

  window.copyArticleLink = function() {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(function() {
        var btn = document.querySelector('.share-copy');
        btn.textContent = '已复制 ✓';
        setTimeout(function() { btn.textContent = '复制链接'; }, 2000);
      });
    } else {
      var input = document.createElement('input');
      input.value = url;
      document.body.appendChild(input);
      input.select();
      document.execCommand('copy');
      document.body.removeChild(input);
      var btn = document.querySelector('.share-copy');
      btn.textContent = '已复制 ✓';
      setTimeout(function() { btn.textContent = '复制链接'; }, 2000);
    }
  };
})();
</script>
