{{ if .Site.Params.comments.enabled }}
<style>
/* === Share === */
.share-thanks{text-align:center;font-size:var(--article-font-size,1.4rem);color:var(--card-text-color-main);margin:4rem 0 1rem;padding-top:2rem;border-top:1px solid var(--card-separator-color,#eee);line-height:1.6}
.share-wrap{position:relative;flex-shrink:0;margin-left:auto}
.share-trigger{display:inline-flex;align-items:center;gap:.6rem;padding:.5rem 1.2rem;background:var(--card-background,#fff);color:var(--card-text-color-main);border:1px solid var(--card-separator-color,#eee);border-radius:6px;font-size:1.3rem;font-weight:600;cursor:pointer;transition:all .15s}
.share-trigger:hover{border-color:var(--accent-color,#667eea);color:var(--accent-color,#667eea)}
.share-dd{display:none;position:absolute;top:50%;right:calc(100% + 8px);transform:translateY(-50%);background:var(--card-background,#fff);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);padding:.5rem;z-index:100;border:1px solid var(--card-separator-color,#eee);flex-direction:row;gap:.3rem}
.share-dd.show{display:flex;animation:sdLeft .15s ease}
@keyframes sdLeft{from{opacity:0;transform:translateY(-50%) translateX(6px)}to{opacity:1;transform:translateY(-50%) translateX(0)}}
.share-dd a,.share-dd button{display:flex;align-items:center;gap:.5rem;padding:.5rem .8rem;border:none;background:none;border-radius:6px;font-size:1.3rem;color:var(--card-text-color-main,#333);text-decoration:none;cursor:pointer;transition:background .1s;white-space:nowrap}
.share-dd a:hover,.share-dd button:hover{background:var(--body-background,#f5f5f5)}

/* === Comment Section === */
.cmt-section{padding:var(--card-padding);background:var(--card-background);border-radius:var(--card-border-radius,10px);box-shadow:var(--shadow-l1);position:relative}
.cmt-head{display:flex;align-items:center;gap:1.2rem;margin-bottom:.6rem}
.cmt-sort-bar{display:flex;align-items:center;justify-content:flex-end;margin-top:.4rem;margin-bottom:.6rem}
.cmt-title{font-size:1.8rem;font-weight:700;color:var(--card-text-color-main);margin:0}
.cmt-count-badge{font-size:1.3rem;color:var(--card-text-color-tertiary);background:var(--body-background,#f5f5f5);padding:.2rem 1rem;border-radius:12px}
#cmtActions{position:absolute;top:var(--card-padding,20px);right:var(--card-padding,20px);display:flex;flex-direction:column;align-items:flex-end;gap:.5rem}
.cmt-write-btn{display:inline-flex;align-items:center;gap:.6rem;padding:.5rem 1.4rem;background:var(--accent-color,#667eea);color:var(--accent-color-text,#fff);border:none;border-radius:8px;font-size:1.3rem;font-weight:600;cursor:pointer;transition:opacity .15s}
.cmt-write-btn:hover{opacity:.85}
.cmt-login-link{display:inline-flex;align-items:center;gap:.6rem;padding:.5rem 1.4rem;background:var(--accent-color,#667eea);color:var(--accent-color-text,#fff)!important;border:none;border-radius:8px;font-size:1.3rem;font-weight:600;cursor:pointer;text-decoration:none;transition:opacity .15s}
.cmt-login-link:hover{opacity:.85}
.cmt-form{display:none;margin-top:1.5rem;position:relative}
.cmt-form.show{display:block;animation:cmtSlide .25s ease}
@keyframes cmtSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.cmt-form-top{display:flex;justify-content:flex-end;align-items:center;margin-bottom:.4rem}
.cmt-form-top .reply-tag{margin-bottom:0;margin-right:auto}
.cmt-form-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--card-text-color-tertiary,#999);padding:.3rem .6rem;border-radius:4px;transition:all .15s;line-height:1;-webkit-tap-highlight-color:transparent;outline:none}
.cmt-form-close:hover{color:var(--card-text-color-main)}
.cmt-field-wrap{position:relative;margin-bottom:0}
.cmt-field-wrap .cmt-float-label{position:absolute;left:1.4rem;top:1.2rem;font-size:1.4rem;color:var(--card-text-color-tertiary,#999);pointer-events:none;transition:all .2s cubic-bezier(.4,0,.2,1);transform-origin:left top;background:transparent;padding:0 .4rem}
.cmt-field-wrap .cmt-textarea:focus~.cmt-float-label,.cmt-field-wrap .cmt-textarea.has-content~.cmt-float-label{top:-.6rem;left:1rem;font-size:1.1rem;color:var(--accent-color,#667eea);background:var(--card-background,#fff)}
.cmt-textarea{width:100%;padding:1.2rem 1.4rem;border:2px solid var(--card-separator-color,#e0e0e0);border-radius:12px;font-size:1.4rem;font-family:inherit;resize:none;min-height:48px;max-height:200px;outline:none;transition:border-color .2s,box-shadow .2s;background:var(--card-background,#fff);color:var(--card-text-color-main);box-sizing:border-box;line-height:1.6;overflow-y:auto;scrollbar-width:none;-ms-overflow-style:none}
.cmt-textarea::-webkit-scrollbar{display:none}
.cmt-textarea:focus{border-color:var(--accent-color,#667eea);box-shadow:0 0 0 3px rgba(102,126,234,.1)}
.cmt-form-ft{display:flex;justify-content:space-between;align-items:center;margin-top:.8rem;padding:0 .2rem}
.cmt-form-tools{display:flex;align-items:center;gap:.6rem}
.cmt-char{font-size:1.15rem;color:var(--card-text-color-tertiary);transition:color .2s}
.cmt-char.warn{color:#f59e0b}
.cmt-char.danger{color:#ef4444}
.cmt-send{padding:.6rem 1.8rem;background:var(--accent-color,#667eea);color:var(--accent-color-text,#fff);border:none;border-radius:20px;font-size:1.3rem;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(102,126,234,.25)}
.cmt-send:hover{opacity:.9;box-shadow:0 4px 12px rgba(102,126,234,.35);transform:translateY(-1px)}
.cmt-send:active{transform:translateY(0);box-shadow:0 2px 6px rgba(102,126,234,.2)}
.cmt-send:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;transform:none}
.cmt-alert{padding:.8rem 1.4rem;border-radius:8px;font-size:1.3rem;margin-top:.8rem}
.cmt-alert-error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.reply-tag{font-size:1.25rem;color:var(--accent-color,#667eea);margin-bottom:.8rem;padding:.5rem 1.2rem;background:rgba(102,126,234,.06);border:1px solid rgba(102,126,234,.15);border-radius:20px;display:inline-flex;align-items:center;gap:.6rem}
.reply-tag button{background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--card-text-color-tertiary);padding:0 .2rem;transition:color .15s}
.reply-tag button:hover{color:#ef4444}
.cmt-list{margin-top:2rem}
.cmt-empty{text-align:center;padding:4rem 1rem;color:var(--card-text-color-tertiary,#bbb)}
.cmt-empty-icon{font-size:3rem;margin-bottom:1rem}
.cmt-empty p{font-size:1.4rem;margin:0}
.cmt-loading{text-align:center;padding:3rem;color:var(--card-text-color-tertiary);font-size:1.4rem}
.c-item{display:flex;gap:1.2rem;padding:1.6rem 0}
.c-item+.c-item{border-top:1px solid var(--card-separator-color,#f0f0f0)}
.c-avatar{width:40px;height:40px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;flex-shrink:0;overflow:hidden}
.c-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.c-body{flex:1;min-width:0}
.c-meta{display:flex;align-items:center;gap:.8rem;margin-bottom:.4rem}
.c-name{font-weight:600;font-size:1.4rem;color:var(--card-text-color-main)}
.c-text{font-size:1.4rem;line-height:1.75;color:var(--card-text-color-main);white-space:pre-wrap;word-break:break-word;margin:.4rem 0 .6rem}
.c-actions{display:flex;align-items:center;gap:1.6rem;font-size:1.2rem;color:var(--card-text-color-tertiary,#999)}
.c-time{font-size:1.2rem;color:var(--card-text-color-tertiary)}
.c-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;padding:0;transition:all .12s;color:var(--card-text-color-tertiary,#999);display:inline-flex;align-items:center;gap:.3rem}
.c-btn:hover{color:var(--accent-color,#667eea)}
.c-btn.liked{color:var(--accent-color,#667eea)}
.c-btn.del:hover{color:#ef4444}
.c-actions-right{display:flex;align-items:center;gap:.4rem;margin-left:auto}
.c-replies{position:relative;margin-top:.6rem}
.c-reply-preview{background:var(--body-background,#f5f5f5);border-radius:8px;padding:1rem 1.4rem;font-size:1.3rem;line-height:1.6;color:var(--card-text-color-main)}
.c-reply-preview .c-rp-name{color:var(--accent-color,#667eea);font-weight:600;margin-right:.4rem}
.c-reply-preview .c-rp-like{font-size:1.1rem;color:var(--card-text-color-tertiary);margin-left:.8rem}
.c-reply-expand{display:inline-flex;align-items:center;gap:.3rem;font-size:1.2rem;color:var(--accent-color,#667eea);cursor:pointer;background:none;border:none;padding:.4rem 0;font-weight:500}
.c-reply-expand:hover{opacity:.8}
.c-reply-to{color:var(--accent-color,#667eea);font-weight:500;margin-right:.3rem}
.cmt-main-sort{display:inline-flex;align-items:center;gap:.6rem}
.cmt-sort-toggle{background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--card-text-color-tertiary);display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .6rem;border-radius:4px;transition:all .12s}
.cmt-sort-toggle:hover{color:var(--accent-color,#667eea)}
.cmt-detail{position:relative;margin-top:2rem}
.cmt-detail-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:1.2rem;border-bottom:1px solid var(--card-separator-color,#f0f0f0);margin-bottom:.4rem}
.cmt-detail-title{font-size:1.5rem;font-weight:600;color:var(--card-text-color-main)}
.cmt-detail-close{background:none;border:none;font-size:1.6rem;cursor:pointer;color:var(--card-text-color-tertiary);padding:.3rem;border-radius:4px;transition:all .12s;line-height:1}
.cmt-detail-close:hover{color:var(--accent-color,#667eea);background:var(--body-background,#f5f5f5)}
.cmt-detail-replies-header{display:flex;align-items:center;justify-content:space-between;padding:.8rem 0;font-size:1.2rem;color:var(--card-text-color-tertiary);border-top:1px solid var(--card-separator-color,#f0f0f0);margin-top:.4rem}
.cmt-detail .c-reply-list .c-item{padding:1rem 0}
.cmt-detail .c-reply-list .c-item+.c-item{border-top:1px solid var(--card-separator-color,#f0f0f0)}
.cmt-detail .c-reply-list .c-avatar{width:32px;height:32px;font-size:1.2rem}
.cmt-detail .c-reply-list .c-text{font-size:1.3rem}
.cmt-detail .c-reply-list .c-actions{font-size:1.1rem;gap:1.2rem}
.emoji-trigger{background:none;border:none;font-size:1.6rem;cursor:pointer;padding:.3rem;border-radius:4px;transition:background .1s;line-height:1;-webkit-tap-highlight-color:transparent;outline:none}
.emoji-trigger:hover{opacity:.7}
.emoji-panel{display:none;background:var(--card-background,#fff);border:1px solid var(--card-separator-color,#e0e0e0);border-radius:10px;margin-top:.6rem;overflow:hidden}
.emoji-panel.show{display:block}
.emoji-tabs{display:flex;gap:0;border-bottom:1px solid var(--card-separator-color,#e0e0e0);overflow-x:auto;padding:0 .4rem}
.emoji-tab{background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-size:1.5rem;padding:.5rem .7rem;transition:all .15s;flex-shrink:0}
.emoji-tab:hover{background:var(--body-background,#f0f0f0)}
.emoji-tab.active{border-bottom-color:var(--accent-color,#667eea)}
.emoji-grid{display:flex;flex-wrap:wrap;gap:.2rem;padding:.6rem;max-height:140px;overflow-y:auto}
.emoji-grid button{background:none;border:none;font-size:1.7rem;cursor:pointer;padding:.25rem .35rem;border-radius:4px;transition:background .1s;line-height:1}
.emoji-grid button:hover{background:var(--body-background,#f0f0f0)}
.cmt-more{background:none;border:1px dashed var(--card-separator-color,#ddd);padding:1rem;border-radius:8px;width:100%;font-size:1.3rem;color:var(--card-text-color-tertiary);cursor:pointer;margin-top:1.2rem;transition:all .15s}
.cmt-more:hover{border-color:var(--accent-color,#667eea);color:var(--accent-color,#667eea)}
.c-btn.report:hover{color:#f59e0b}
.report-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.report-modal.show{display:flex}
.report-modal-content{background:var(--card-background,#fff);border-radius:16px;padding:1.5rem;width:90%;max-width:340px;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.report-opt{display:block;width:100%;text-align:left;padding:.7rem 1rem;margin:.3rem 0;border:1.5px solid var(--card-separator-color,#e0e0e0);border-radius:8px;background:none;font-size:1.3rem;cursor:pointer;transition:all .15s;color:var(--card-text-color-main)}
.report-opt:hover{border-color:var(--accent-color,#667eea);background:rgba(102,126,234,.05)}
.report-toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;padding:.6rem 1.2rem;border-radius:10px;font-size:1.3rem;font-weight:600;z-index:300;animation:cmtSlide .3s ease}
</style>

<section id="comments" class="article-comments">
  <div class="cmt-section">
    <div class="cmt-head">
      <h3 class="cmt-title">💬 评论</h3>
      <span class="cmt-count-badge" id="cmtCount"></span>
    </div>
    <div id="cmtActions">
      <button class="cmt-write-btn" id="cmtWriteBtn" style="display:none" onclick="toggleForm()">✏️ 写评论</button>
      <a class="cmt-login-link" id="cmtLoginLink" style="display:none">🔑 登录后评论</a>
    </div>

    <div class="cmt-form" id="cmtForm">
      <div class="cmt-form-top"><button type="button" class="cmt-form-close" onclick="toggleForm()">✕</button></div>
      <div class="cmt-field-wrap">
        <textarea id="cmtInput" class="cmt-textarea" maxlength="1000" rows="1"></textarea>
        <label class="cmt-float-label" for="cmtInput">说点什么...</label>
      </div>
      <div class="cmt-form-ft">
        <div class="cmt-form-tools">
          <button type="button" class="emoji-trigger" id="emojiBtn" title="表情">😀</button>
          <span class="cmt-char"><span id="cmtChar">0</span>/1000</span>
        </div>
        <button class="cmt-send" id="cmtSend">发送</button>
      </div>
      <div class="emoji-panel" id="emojiPanel"></div>
      <div id="cmtAlert" class="cmt-alert" style="display:none"></div>
    </div>

    <div class="cmt-sort-bar">
      <button class="cmt-sort-toggle" id="cmtMainSort" onclick="toggleMainSort()">☰ 按热度</button>
    </div>
    <div id="cmtList" class="cmt-list"><div class="cmt-loading">加载中...</div></div>
    <div id="cmtDetail" class="cmt-detail" style="display:none"></div>
  </div>
</section>

<script>
(function(){
  var API='https://auth.liliwiki.com', pageUrl=window.location.pathname;
  var curUser=null, isAdmin=false, replyTo=null, allComments=[], folded=true, mainSortMode='hot';
  var COLORS=['#667eea','#764ba2','#e74c3c','#2ecc71','#f39c12','#1abc9c','#e91e63','#9b59b6','#3498db','#e67e22'];
  function hc(s){var h=0;for(var i=0;i<s.length;i++){h=s.charCodeAt(i)+((h<<5)-h);}return COLORS[Math.abs(h)%COLORS.length];}

  // === Dynamic Injection ===
  // 1. Inject thanks text at the end of article content
  var ac = document.querySelector('.article-content') || document.querySelector('article');
  if(ac) {
    var thanks = document.createElement('div');
    thanks.className = 'share-thanks';
    thanks.innerHTML = '如果你喜欢这篇文章，请分享给更多人 ❤️';
    ac.appendChild(thanks);
  }

  // 2. Inject share button right next to tags in article footer
  var shareWrap = document.createElement('div');
  shareWrap.className = 'share-wrap';
  shareWrap.innerHTML = 
    '<button class="share-trigger" onclick="toggleShare()">↗ 分享</button>'+
    '<div class="share-dd" id="shareDD">'+
      '<a id="sTwitter" target="_blank" rel="noopener"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg> Twitter</a>'+
      '<a id="sWeibo" target="_blank" rel="noopener"><svg width="16" height="16" viewBox="0 0 24 24" fill="#E6162D"><path d="M10.098 20.323c-3.977.391-7.414-1.406-7.672-4.02-.259-2.609 2.759-5.047 6.74-5.441 3.979-.394 7.413 1.404 7.671 4.018.259 2.6-2.759 5.049-6.739 5.443zM9.05 17.219c-.384.616-1.208.884-1.829.602-.612-.279-.793-.991-.406-1.593.379-.595 1.176-.861 1.793-.583.631.283.822.997.442 1.574zm1.27-1.627c-.141.237-.449.353-.689.253-.236-.095-.307-.371-.168-.603.141-.229.437-.348.673-.246.239.09.315.369.184.596zm.176-2.719c-1.893-.493-4.033.45-4.857 2.118-.836 1.704-.026 3.591 1.886 4.21 1.983.642 4.318-.341 5.132-2.179.8-1.793-.201-3.642-2.161-4.149zM17.343 6.065c-.609-1.394-2.066-2.08-3.269-1.544-1.178.525-1.706 1.963-1.182 3.221.033.086.073.163.109.244l-.042.019c-.943.4-2.576 1.426-3.544 3.062-1.123 1.907-.946 3.886.488 5.291 1.467 1.44 4.005 1.907 6.322.935C18.649 16.267 20 13.971 20 11.439c-.003-.939-.161-2.207-.479-3.125-.169-.487-.361-.903-.668-1.28-.048-.056-.081-.138-.13-.194l.08-.037c1.326-.557 1.574-2.071.54-2.738z"/></svg> 微博</a>'+
      '<a id="sQQ" target="_blank" rel="noopener"><svg width="16" height="16" viewBox="0 0 24 24" fill="#12B7F5"><path d="M12.003 2C6.424 2 3 6.867 3 10.29c0 2.097.65 4.065 1.696 5.776-.263.796-.652 1.584-1.12 2.17-.322.403.05.932.536.79.923-.269 1.927-.734 2.72-1.313A10.27 10.27 0 0012.003 19c5.579 0 9.003-4.867 9.003-8.29C21.006 6.451 17.582 2 12.003 2z"/></svg> QQ</a>'+
      '<button id="sCopy">🔗 复制链接</button>'+
    '</div>';

  var tagsSec = document.querySelector('.article-footer .article-tags');
  if(tagsSec) {
    tagsSec.style.width = '100%';
    tagsSec.appendChild(shareWrap);
  } else {
    var footer = document.querySelector('.article-footer');
    if(footer) {
      var sec = document.createElement('section');
      sec.className = 'article-tags';
      sec.style.width = '100%';
      sec.appendChild(shareWrap);
      footer.insertBefore(sec, footer.firstChild);
    }
  }

  // Setup share links
  var et=encodeURIComponent(document.title), eu=encodeURIComponent(window.location.href);
  var sT=document.getElementById('sTwitter'), sW=document.getElementById('sWeibo'), sQ=document.getElementById('sQQ');
  if(sT) sT.href='https://twitter.com/intent/tweet?text='+et+'&url='+eu;
  if(sW) sW.href='https://service.weibo.com/share/share.php?title='+et+'&url='+eu;
  if(sQ) sQ.href='https://connect.qq.com/widget/shareqq/index.html?title='+et+'&url='+eu;
  window.toggleShare=function(){var d=document.getElementById('shareDD');if(!d)return;var isMobile=window.innerWidth<=768;if(isMobile){var btn=d.parentElement.querySelector('.share-trigger');if(btn){var r=btn.getBoundingClientRect();if(!d.classList.contains('show')){d.style.cssText='display:flex;position:fixed;top:'+(r.bottom+8)+'px;left:50%;transform:translateX(-50%);right:auto;animation:none;flex-direction:row';d.classList.add('show');}else{d.classList.remove('show');d.style.cssText='';}}else{d.classList.toggle('show');}}else{d.classList.toggle('show');}};
  document.addEventListener('click',function(e){if(!e.target.closest('.share-wrap')){var d=document.getElementById('shareDD');if(d)d.classList.remove('show');}});
  var cb=document.getElementById('sCopy');
  if(cb) cb.onclick=function(e){e.stopPropagation();var b=this;navigator.clipboard.writeText(window.location.href).then(function(){b.textContent='\u2713 \u5df2\u590d\u5236';setTimeout(function(){b.textContent='\uD83D\uDD17 \u590d\u5236\u94fe\u63a5';},2000);});};

  // === Auth ===
  fetch(API+'/api/me',{credentials:'include'}).then(function(r){return r.json();}).then(function(d){
    var u=d.user||d;
    if(u&&u.email){
      curUser=u; isAdmin=u.role==='admin'||u.role==='sub_admin';
      document.getElementById('cmtWriteBtn').style.display='';
      document.getElementById('cmtLoginLink').style.display='none';
    } else { doLogin(); }
  }).catch(function(){ doLogin(); });

  function doLogin(){
    document.getElementById('cmtWriteBtn').style.display='none';
    document.getElementById('cmtLoginLink').style.display='';
    document.getElementById('cmtLoginLink').href=API+'/login?redirect='+encodeURIComponent(window.location.href);
  }

  // === Toggle form ===
  window.toggleForm=function(){
    var f=document.getElementById('cmtForm');
    f.classList.toggle('show');
    if(f.classList.contains('show')) document.getElementById('cmtInput').focus();
  };

  // === Load & render comments ===
  loadCmts();
  var cmtInput=document.getElementById('cmtInput'),cmtCharEl=document.getElementById('cmtChar'),cmtCharWrap=cmtCharEl.parentElement;

    {icon:'\ud83c\udf54',name:'\u98df\u7269',list:['\ud83c\udf4e','\ud83c\udf4a','\ud83c\udf4b','\ud83c\udf4c','\ud83c\udf49','\ud83c\udf47','\ud83c\udf53','\ud83c\udf51','\ud83c\udf52','\ud83c\udf45','\ud83c\udf55','\ud83c\udf54','\ud83c\udf5f','\ud83c\udf5c','\ud83c\udf63','\ud83c\udf71','\ud83c\udf5b','\ud83c\udf5d','\ud83c\udf70','\ud83c\udf82','\ud83c\udf69','\ud83c\udf6a','\ud83c\udf6b','\ud83c\udf6c','\ud83c\udf6d','\u2615','\ud83c\udf75','\ud83c\udf7a','\ud83c\udf7b','\ud83c\udf77']},
    {icon:'\ud83c\udf89',name:'\u6d3b\u52a8',list:['\u26bd','\ud83c\udfc0','\ud83c\udfbe','\ud83c\udfb1','\ud83c\udfaf','\ud83c\udfae','\ud83c\udfb2','\ud83c\udfac','\ud83c\udfa4','\ud83c\udfa7','\ud83c\udfb5','\ud83c\udfb6','\ud83c\udfb9','\ud83c\udfb8','\ud83c\udfc6','\ud83c\udf89','\ud83c\udf8a','\ud83c\udf88','\ud83c\udf81','\ud83d\udcf7','\ud83d\udcbb','\ud83d\udcda','\ud83d\udcdd','\ud83d\udd28','\ud83d\udd27','\ud83d\udce6']}
  ];
  var emojiPanel=document.getElementById('emojiPanel');
  var emojiCurCat=0, emojiSwitching=false;
  function renderEmojiPanel(){
    var tabs='<div class="emoji-tabs">';
    EMOJI_CATS.forEach(function(cat,i){tabs+='<button class="emoji-tab'+(i===emojiCurCat?' active':'')+'" onclick="switchEmojiCat('+i+')">'+cat.icon+'</button>';});
    tabs+='</div>';
    var grid='<div class="emoji-grid">';
    EMOJI_CATS[emojiCurCat].list.forEach(function(e){grid+='<button type="button" onclick="insertEmoji(\''+e+'\')">'+e+'</button>';});
    grid+='</div>';
    emojiPanel.innerHTML=tabs+grid;
  }
  window.switchEmojiCat=function(i){emojiSwitching=true;emojiCurCat=i;renderEmojiPanel();setTimeout(function(){emojiSwitching=false;},0);};
  renderEmojiPanel();
  document.getElementById('emojiBtn').addEventListener('click',function(ev){ev.stopPropagation();emojiPanel.classList.toggle('show');});
  document.addEventListener('click',function(e){if(emojiSwitching)return;if(!e.target.closest('#emojiPanel')&&!e.target.closest('#emojiBtn')){emojiPanel.classList.remove('show');}});
  window.insertEmoji=function(emoji){
    var ta=document.getElementById('cmtInput');
    var start=ta.selectionStart, end=ta.selectionEnd;
    ta.value=ta.value.substring(0,start)+emoji+ta.value.substring(end);
    ta.selectionStart=ta.selectionEnd=start+emoji.length;
    ta.focus();
    cmtCharEl.textContent=ta.value.length;
    autoResize();updateFloatLabel();updateCharColor();
  };

  function loadCmts(){
    fetch(API+'/api/comments?url='+encodeURIComponent(pageUrl),{credentials:'include'}).then(function(r){return r.json();}).then(function(d){
      allComments=d.comments||[];
      var badge=document.getElementById('cmtCount');
      badge.textContent=allComments.length>0?allComments.length+' \u6761':'';
      renderList();
    }).catch(function(){document.getElementById('cmtList').innerHTML='<div class="cmt-empty"><p>\u8bc4\u8bba\u52a0\u8f7d\u5931\u8d25</p></div>';});
  }

  function getKids(){
    var kids={};
    allComments.forEach(function(c){if(c.parent_id){if(!kids[c.parent_id])kids[c.parent_id]=[];kids[c.parent_id].push(c);}});
    return kids;
  }

  function renderList(){
    var el=document.getElementById('cmtList');
    document.getElementById('cmtDetail').style.display='none';
    el.style.display='';
    if(!allComments.length){el.innerHTML='<div class="cmt-empty"><div class="cmt-empty-icon">\uD83D\uDCAC</div><p>\u6682\u65e0\u8bc4\u8bba\uff0c\u6765\u8bf4\u4e24\u53e5\u5427</p></div>';return;}
    var roots=[], kids=getKids();
    allComments.forEach(function(c){if(!c.parent_id) roots.push(c);});
    var sorted;
    if(mainSortMode==='time') sorted=roots.slice().sort(function(a,b){return Number(b.created_at)-Number(a.created_at);});
    else sorted=roots.slice().sort(function(a,b){return(b.likes||0)-(a.likes||0);});
    var show=folded&&sorted.length>3?sorted.slice(0,3):sorted;
    var h='';
    show.forEach(function(c){h+=renderC(c,kids);});
    if(folded&&sorted.length>3) h+='<button class="cmt-more" onclick="expandCmts()">\u5c55\u5f00\u5168\u90e8 '+sorted.length+' \u6761\u8bc4\u8bba</button>';
    else if(!folded&&sorted.length>3) h+='<button class="cmt-more" onclick="foldCmts()">\u6536\u8d77\u8bc4\u8bba</button>';
    el.innerHTML=h;
    document.getElementById('cmtMainSort').textContent='\u2630 '+(mainSortMode==='hot'?'\u6309\u70ed\u5ea6':'\u6309\u65f6\u95f4');
  }
  window.expandCmts=function(){folded=false;renderList();};
  window.foldCmts=function(){folded=true;renderList();};
  window.toggleMainSort=function(){mainSortMode=mainSortMode==='hot'?'time':'hot';renderList();};

  function fmtTime(ts){
    var d=new Date(Number(ts));
    if(isNaN(d.getTime())) return '\u672a\u77e5\u65f6\u95f4';
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
  }

  function renderC(c,kids){
    var ts=fmtTime(c.created_at);
    var avatarH=c.avatar?'<span class="c-avatar"><img src="'+esc(c.avatar)+'" alt=""></span>':'<span class="c-avatar" style="background:'+hc(c.user_name||'?')+'">'+esc((c.user_name||'?')[0].toUpperCase())+'</span>';
    var lk=c.likes||0, lb=[];try{lb=JSON.parse(c.liked_by||'[]');}catch(e){}
    var liked=curUser&&lb.indexOf(curUser.email)!==-1;
    var replyH=curUser?'<button class="c-btn" onclick="replyTo(\''+c.id+'\',\''+esc(c.user_name)+'\')">\u56de\u590d</button>':'';
    var delH=isAdmin?'<button class="c-btn del" onclick="delCmt(\''+c.id+'\')">\u5220\u9664</button>':'';
    var reportH=curUser?'<button class="c-btn report" onclick="openReport(\'comment\',\''+c.id+'\')">\u26a0</button>':'';
    var likeH='<button class="c-btn'+(liked?' liked':'')+'" onclick="likeCmt(\''+c.id+'\')">'+'\uD83D\uDC4D'+(lk?' '+lk:'')+'</button>';
    var html='<div class="c-item" id="c-'+c.id+'">'+avatarH+'<div class="c-body"><div class="c-meta"><span class="c-name">'+esc(c.user_name)+'</span></div><div class="c-text">'+esc(c.content)+'</div><div class="c-actions"><span class="c-time">'+ts+'</span>'+replyH+'<div class="c-actions-right">'+likeH+reportH+delH+'</div></div>';
    var replies=kids[c.id];
    if(replies&&replies.length){
      var hotSorted=replies.slice().sort(function(a,b){return(b.likes||0)-(a.likes||0);});
      var top=hotSorted[0];
      var topLk=top.likes||0;
      html+='<div class="c-replies">';
      html+='<div class="c-reply-preview"><span class="c-rp-name">'+esc(top.user_name)+':</span>'+fmtReplyContent(top.content)+(topLk?'<span class="c-rp-like">\uD83D\uDC4D '+topLk+'</span>':'')+'</div>';
      html+='<button class="c-reply-expand" onclick="openDetail(\''+c.id+'\')">\u76f8\u5173\u56de\u590d\u5171'+replies.length+'\u6761 ></button>';
      html+='</div>';
    }
    html+='</div></div>';
    return html;
  }

  function fmtReplyContent(content){
    var m=content.match(/^\u56de\u590d @([^：:]+)[：:]\s*/);
    if(m) return '<span class="c-reply-to">\u56de\u590d @'+esc(m[1])+'</span>'+esc(content.substring(m[0].length));
    return esc(content);
  }

  function renderReply(c){
    var ts=fmtTime(c.created_at);
    var avatarH=c.avatar?'<span class="c-avatar"><img src="'+esc(c.avatar)+'" alt=""></span>':'<span class="c-avatar" style="background:'+hc(c.user_name||'?')+'">'+esc((c.user_name||'?')[0].toUpperCase())+'</span>';
    var lk=c.likes||0, lb=[];try{lb=JSON.parse(c.liked_by||'[]');}catch(e){}
    var liked=curUser&&lb.indexOf(curUser.email)!==-1;
    var replyH=curUser?'<button class="c-btn" onclick="replyTo(\''+c.id+'\',\''+esc(c.user_name)+'\')">\u56de\u590d</button>':'';
    var delH=isAdmin?'<button class="c-btn del" onclick="delCmt(\''+c.id+'\')">\u5220\u9664</button>':'';
    var reportH=curUser?'<button class="c-btn report" onclick="openReport(\'comment\',\''+c.id+'\')">\u26a0</button>':'';
    var likeH='<button class="c-btn'+(liked?' liked':'')+'" onclick="likeCmt(\''+c.id+'\')">'+'\uD83D\uDC4D'+(lk?' '+lk:'')+'</button>';
    var textH=fmtReplyContent(c.content);
    return '<div class="c-item">'+avatarH+'<div class="c-body"><div class="c-meta"><span class="c-name">'+esc(c.user_name)+'</span></div><div class="c-text">'+textH+'</div><div class="c-actions"><span class="c-time">'+ts+'</span>'+replyH+'<div class="c-actions-right">'+likeH+reportH+delH+'</div></div></div></div>';
  }

  var detailSortMode='hot', currentDetailId=null;
  window.openDetail=function(parentId){
    detailSortMode='hot';
    currentDetailId=parentId;
    var el=document.getElementById('cmtDetail');
    document.getElementById('cmtList').style.display='none';
    document.getElementById('cmtActions').style.display='none';
    document.querySelector('.cmt-sort-bar').style.display='none';
    var cmtForm=document.getElementById('cmtForm');if(cmtForm.classList.contains('show'))cmtForm.classList.remove('show');
    el.style.display='';
    renderDetail();
  };
  window.closeDetail=function(){
    document.getElementById('cmtActions').style.display='';
    document.querySelector('.cmt-sort-bar').style.display='';
    currentDetailId=null;
    renderList();
  };

  function renderDetail(){
    var parentId=currentDetailId;
    var el=document.getElementById('cmtDetail');
    var parent=null;
    allComments.forEach(function(c){if(String(c.id)===String(parentId)) parent=c;});
    if(!parent){el.innerHTML='';return;}
    var kids=getKids();
    var h='<div class="cmt-detail-header"><span class="cmt-detail-title">\u8bc4\u8bba\u8be6\u60c5</span><button class="cmt-detail-close" onclick="closeDetail()">\u2715</button></div>';
    h+=renderC(parent,{});
    var replies=kids[parentId]||[];
    if(!replies.length){allComments.forEach(function(c){if(String(c.parent_id)===String(parentId)) replies.push(c);});}
    var sorted;
    if(detailSortMode==='time') sorted=replies.slice().sort(function(a,b){return Number(b.created_at)-Number(a.created_at);});
    else sorted=replies.slice().sort(function(a,b){return(b.likes||0)-(a.likes||0);});
    var sortLabel=detailSortMode==='hot'?'\u6309\u70ed\u5ea6':'\u6309\u65f6\u95f4';
    h+='<div class="cmt-detail-replies-header"><span>\u76f8\u5173\u56de\u590d\u5171'+replies.length+'\u6761</span><button class="cmt-sort-toggle" onclick="toggleDetailSort()">\u2630 '+sortLabel+'</button></div>';
    h+='<div class="c-reply-list">';
    sorted.forEach(function(r){h+=renderReply(r);});
    h+='</div>';
    el.innerHTML=h;
  }

  window.toggleDetailSort=function(){
    detailSortMode=detailSortMode==='hot'?'time':'hot';
    renderDetail();
  };

  function pad(n){return n<10?'0'+n:''+n;}
  function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):'';}
  function postAPI(p,d){return fetch(API+p,{method:'POST',credentials:'include',headers:{'Content-Type':'text/plain'},body:JSON.stringify(d)}).then(function(r){return r.json();});}

  function submitCmt(){
    var input=document.getElementById('cmtInput'), content=input.value.trim();
    if(!content) return;
    if(replyTargetName) content='\u56de\u590d @'+replyTargetName+'\uff1a'+content;
    var btn=document.getElementById('cmtSend');
    btn.disabled=true; btn.textContent='\u53d1\u9001\u4e2d...';
    postAPI('/api/comments',{url:pageUrl,content:content,parent_id:replyTo||''}).then(function(d){
      btn.disabled=false; btn.textContent='\u53d1\u9001';
      if(d.error){showAlert(d.error);}
      else{input.value='';cmtCharEl.textContent='0';input.style.height='';input.classList.remove('has-content');cmtCharWrap.className='cmt-char';cancelReply();folded=false;loadCmts();}
    }).catch(function(){btn.disabled=false;btn.textContent='\u53d1\u9001';showAlert('\u53d1\u9001\u5931\u8d25');});
  }

  window.delCmt=function(id){if(!confirm('\u786e\u5b9a\u5220\u9664\uff1f'))return;postAPI('/api/comments/delete',{id:id}).then(function(d){if(d.ok)loadCmts();else showAlert(d.error||'\u5220\u9664\u5931\u8d25');});};
  window.likeCmt=function(id){postAPI('/api/comments/like',{id:id}).then(function(d){if(d.ok)loadCmts();else if(d.error)showAlert(d.error);});};

  var replyTargetName=null;
  function findRootParent(id){
    var c=null;
    allComments.forEach(function(x){if(x.id===id)c=x;});
    if(c&&c.parent_id) return findRootParent(c.parent_id);
    return id;
  }
  window.replyTo=function(id,name){
    var rootId=findRootParent(id);
    var isReplyToReply=rootId!==id;
    replyTo=rootId;
    replyTargetName=isReplyToReply?name:null;
    var f=document.getElementById('cmtForm');
    if(!f.classList.contains('show')) f.classList.add('show');
    var input=document.getElementById('cmtInput');
    var fl=document.querySelector('.cmt-float-label');if(fl)fl.textContent='\u56de\u590d '+name+'...';
    input.focus();
    var ex=document.getElementById('replyTag');if(ex)ex.remove();
    var tag=document.createElement('div');tag.id='replyTag';tag.className='reply-tag';
    tag.innerHTML='\u56de\u590d <b>'+esc(name)+'</b> <button onclick="cancelReply()">\u2715</button>';
    var top=document.querySelector('.cmt-form-top');var closeBtn=top.querySelector('.cmt-form-close');top.insertBefore(tag,closeBtn);
  };
  window.cancelReply=function(){replyTo=null;replyTargetName=null;var fl=document.querySelector('.cmt-float-label');if(fl)fl.textContent='\u8bf4\u70b9\u4ec0\u4e48...';var ex=document.getElementById('replyTag');if(ex)ex.remove();};
  function showAlert(msg){var el=document.getElementById('cmtAlert');el.textContent=msg;el.className='cmt-alert cmt-alert-error';el.style.display='block';setTimeout(function(){el.style.display='none';},3000);}

  // === Report ===
  var reportType='', reportTargetId='';
  window.openReport=function(type,targetId){
    if(!curUser) return;
    reportType=type; reportTargetId=targetId;
    var modal=document.getElementById('reportModal');
    if(!modal){
      modal=document.createElement('div');modal.id='reportModal';modal.className='report-modal';
      modal.innerHTML='<div class="report-modal-content"><h3 style="font-size:1.5rem;margin-bottom:.8rem">\u4e3e\u62a5</h3><button class="report-opt" onclick="submitReport(\'\u8bc4\u8bba\u5185\u5bb9\u8fdd\u89c4\')">\u8bc4\u8bba\u5185\u5bb9\u8fdd\u89c4</button><button class="report-opt" onclick="submitReport(\'\u5934\u50cf\u8fdd\u89c4\')">\u5934\u50cf\u8fdd\u89c4</button><button style="width:100%;margin-top:.6rem;padding:.6rem;background:none;border:1px solid var(--card-separator-color,#ddd);border-radius:8px;font-size:1.2rem;cursor:pointer;color:var(--card-text-color-tertiary)" onclick="closeReport()">\u53d6\u6d88</button></div>';
      document.body.appendChild(modal);
      modal.addEventListener('click',function(e){if(e.target===modal)closeReport();});
    }
    modal.classList.add('show');
  };
  window.closeReport=function(){var m=document.getElementById('reportModal');if(m)m.classList.remove('show');};
  window.submitReport=function(reason){
    closeReport();
    var tid=reportTargetId;
    postAPI('/api/report',{type:reportType,targetId:tid,reason:reason,pageUrl:window.location.href}).then(function(d){
      if(d.ok){var t=document.createElement('div');t.className='report-toast';t.textContent=d.message||'\u4e3e\u62a5\u5df2\u63d0\u4ea4';document.body.appendChild(t);setTimeout(function(){t.remove();},2500);var el=document.getElementById('c-'+tid);if(el){var btns=el.querySelectorAll('.c-btn.report');btns.forEach(function(b){b.textContent='\u2705 \u5df2\u4e3e\u62a5';b.disabled=true;b.style.color='#16a34a';b.onclick=null;});}}
      else{var t=document.createElement('div');t.className='report-toast';t.style.background='#ef4444';t.textContent=d.error||'\u4e3e\u62a5\u5931\u8d25';document.body.appendChild(t);setTimeout(function(){t.remove();},2500);}
    }).catch(function(){var t=document.createElement('div');t.className='report-toast';t.style.background='#ef4444';t.textContent='\u7f51\u7edc\u9519\u8bef';document.body.appendChild(t);setTimeout(function(){t.remove();},2500);});
  };
})();
</script>
