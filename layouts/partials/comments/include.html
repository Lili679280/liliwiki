{{ if .Site.Params.comments.enabled }}
<style>
/* Share - injected into article */
.share-end{display:flex;align-items:center;justify-content:space-between;margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--card-separator-color,#eee)}
.share-end p{font-size:1rem;color:var(--card-text-color-secondary,#666);margin:0}
.share-wrap{position:relative}
.share-trigger{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1.4rem;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s}
.share-trigger:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(102,126,234,.3)}
.share-dd{display:none;position:absolute;top:50%;right:calc(100% + 10px);transform:translateY(-50%);background:var(--card-background,#fff);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.12);padding:.5rem;min-width:170px;z-index:100}
.share-dd.show{display:block;animation:sdFade .12s ease}
@keyframes sdFade{from{opacity:0;transform:translateY(-50%) translateX(4px)}to{opacity:1;transform:translateY(-50%) translateX(0)}}
.share-dd a,.share-dd button{display:flex;align-items:center;gap:.5rem;width:100%;padding:.55rem .9rem;border:none;background:none;border-radius:6px;font-size:1rem;color:var(--card-text-color-main,#333);text-decoration:none;cursor:pointer;transition:background .1s;white-space:nowrap}
.share-dd a:hover,.share-dd button:hover{background:rgba(102,126,234,.08)}
/* Comment section */
.cmt-section{padding:1.5rem;background:var(--card-background);border-radius:var(--card-border-radius,10px);box-shadow:var(--shadow-l1)}
.cmt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
.cmt-title{font-size:1.25rem;font-weight:700;color:var(--card-text-color-main);margin:0}
.cmt-count{font-size:.9rem;color:var(--card-text-color-tertiary,#aaa);background:var(--body-background,#f5f5f5);padding:.2rem .6rem;border-radius:10px}
.cmt-textarea{width:100%;padding:1rem 1.2rem;border:1.5px solid var(--card-separator-color,#e0e0e0);border-radius:10px;font-size:1rem;font-family:inherit;resize:vertical;min-height:120px;outline:none;transition:border-color .2s;background:var(--body-background,#fff);color:var(--card-text-color-main);box-sizing:border-box}
.cmt-textarea:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1)}
.cmt-form-ft{display:flex;justify-content:space-between;align-items:center;margin-top:.7rem}
.cmt-char{font-size:.9rem;color:var(--card-text-color-tertiary,#999)}
.cmt-submit{padding:.6rem 1.6rem;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:transform .15s}
.cmt-submit:hover{transform:translateY(-1px)}
.cmt-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.cmt-user{display:flex;align-items:center;gap:.6rem;margin-bottom:.8rem;font-size:1rem;color:var(--card-text-color-secondary)}
.cmt-login{text-align:center;padding:2rem;color:var(--card-text-color-secondary,#888)}
.cmt-login p{margin-bottom:1rem;font-size:1rem}
.cmt-login-btn{display:inline-block;padding:.6rem 2rem;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff!important;border-radius:8px;text-decoration:none;font-size:1rem;font-weight:600}
.cmt-list{margin-top:1rem}
.cmt-empty{text-align:center;padding:2.5rem 1rem;color:var(--card-text-color-tertiary,#bbb)}
.cmt-empty .cmt-empty-icon{font-size:2.5rem;margin-bottom:.5rem}
.cmt-empty p{font-size:1rem;margin:0}
.cmt-loading{text-align:center;padding:2rem;color:var(--card-text-color-tertiary,#aaa);font-size:1rem}
.cmt-item{display:flex;gap:.8rem;padding:1rem 0}
.cmt-item+.cmt-item{border-top:1px solid var(--card-separator-color,#f0f0f0)}
.cmt-avatar{width:40px;height:40px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:700;flex-shrink:0}
.cmt-main{flex:1;min-width:0}
.cmt-meta{display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem}
.cmt-name{font-weight:600;font-size:1rem;color:var(--card-text-color-main)}
.cmt-time{font-size:.85rem;color:var(--card-text-color-tertiary,#aaa);margin-left:auto}
.cmt-bubble{background:var(--body-background,#f5f5f5);padding:.8rem 1.1rem;border-radius:0 12px 12px 12px;font-size:1rem;line-height:1.7;color:var(--card-text-color-main);white-space:pre-wrap;word-break:break-word;margin-bottom:.4rem}
.cmt-acts{display:flex;align-items:center;gap:.2rem}
.cmt-act{background:none;border:none;font-size:.9rem;cursor:pointer;padding:.2rem .5rem;border-radius:4px;transition:all .12s;color:var(--card-text-color-tertiary,#999)}
.cmt-act:hover{color:#667eea;background:rgba(102,126,234,.06)}
.cmt-act.liked{color:#e74c3c}
.cmt-replies{margin-left:3rem;padding-left:1rem;border-left:2px solid var(--card-separator-color,#e8e8e8)}
.cmt-replies .cmt-item{padding:.6rem 0}
.cmt-replies .cmt-avatar{width:32px;height:32px;font-size:.82rem}
.cmt-replies .cmt-bubble{font-size:.95rem;padding:.6rem .9rem}
.cmt-fold-btn{background:none;border:1px dashed var(--card-separator-color,#ddd);padding:.7rem;border-radius:8px;width:100%;font-size:.95rem;color:var(--card-text-color-tertiary,#999);cursor:pointer;margin-top:.8rem;transition:all .15s}
.cmt-fold-btn:hover{border-color:#667eea;color:#667eea}
.reply-ind{font-size:.95rem;color:var(--card-text-color-secondary);margin-bottom:.5rem;padding:.4rem .8rem;background:rgba(102,126,234,.06);border-radius:6px;display:inline-flex;align-items:center;gap:.4rem}
.reply-ind button{background:none;border:none;cursor:pointer;font-size:.9rem;color:var(--card-text-color-tertiary);padding:0 .3rem}
.reply-ind button:hover{color:#ef4444}
.cmt-alert{padding:.6rem 1rem;border-radius:8px;font-size:.95rem;margin-top:.6rem}
.cmt-alert-error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
</style>
<!-- Share template -->
<template id="shareTpl">
  <div class="share-end">
    <p>如果你喜欢这篇文章，请分享给更多人 ❤️</p>
    <div class="share-wrap">
      <button class="share-trigger" onclick="toggleShare()">↗ 分享</button>
      <div class="share-dd" id="shareDD">
        <a id="sTwitter" target="_blank" rel="noopener">𝕏 Twitter</a>
        <a id="sWeibo" target="_blank" rel="noopener">🔴 微博</a>
        <a id="sQQ" target="_blank" rel="noopener">🔵 QQ</a>
        <button id="sCopy">🔗 复制链接</button>
      </div>
    </div>
  </div>
</template>

<section id="comments" class="article-comments">
  <div class="cmt-section">
    <div class="cmt-header">
      <h3 class="cmt-title">💬 评论</h3>
      <span class="cmt-count" id="cmtCount"></span>
    </div>
    <div id="cmtForm" style="display:none">
      <div class="cmt-user" id="cmtUser"></div>
      <textarea id="cmtInput" class="cmt-textarea" placeholder="写下你的评论..." maxlength="1000" rows="3"></textarea>
      <div class="cmt-form-ft">
        <span class="cmt-char"><span id="cmtChar">0</span>/1000</span>
        <button class="cmt-submit" id="cmtSubmit">发送</button>
      </div>
      <div id="cmtAlert" class="cmt-alert" style="display:none"></div>
    </div>
    <div id="cmtLogin" style="display:none" class="cmt-login">
      <p>登录后即可评论</p>
      <a id="cmtLoginLink" class="cmt-login-btn">登录 / 注册</a>
    </div>
    <div id="cmtList" class="cmt-list"><div class="cmt-loading">加载中...</div></div>
  </div>
</section>

<script>
(function(){
  var API='https://auth.liliwiki.com',pageUrl=window.location.pathname,curUser=null,isAdmin=false,replyTo=null,allComments=[],folded=true;
  var COLORS=['#667eea','#764ba2','#e74c3c','#2ecc71','#f39c12','#1abc9c','#e91e63','#9b59b6','#3498db','#e67e22'];
  function hashColor(s){var h=0;for(var i=0;i<s.length;i++){h=s.charCodeAt(i)+((h<<5)-h);}return COLORS[Math.abs(h)%COLORS.length];}

  // Inject share into article
  var tpl=document.getElementById('shareTpl');
  var ac=document.querySelector('.article-content')||document.querySelector('article');
  if(tpl&&ac){ac.appendChild(tpl.content.cloneNode(true));}
  var et=encodeURIComponent(document.title),eu=encodeURIComponent(window.location.href);
  var sT=document.getElementById('sTwitter'),sW=document.getElementById('sWeibo'),sQ=document.getElementById('sQQ');
  if(sT)sT.href='https://twitter.com/intent/tweet?text='+et+'&url='+eu;
  if(sW)sW.href='https://service.weibo.com/share/share.php?title='+et+'&url='+eu;
  if(sQ)sQ.href='https://connect.qq.com/widget/shareqq/index.html?title='+et+'&url='+eu;
  window.toggleShare=function(){var d=document.getElementById('shareDD');if(d)d.classList.toggle('show');};
  document.addEventListener('click',function(e){if(!e.target.closest('.share-wrap')){var d=document.getElementById('shareDD');if(d)d.classList.remove('show');}});
  var cb=document.getElementById('sCopy');
  if(cb)cb.onclick=function(e){e.stopPropagation();var b=this;navigator.clipboard.writeText(window.location.href).then(function(){b.textContent='\u2713 \u5df2\u590d\u5236';setTimeout(function(){b.textContent='\uD83D\uDD17 \u590D\u5236\u94FE\u63A5';},2000);});};

  // Auth
  fetch(API+'/api/me',{credentials:'include'}).then(function(r){return r.json();}).then(function(d){
    var u=d.user||d;
    if(u&&u.email){curUser=u;isAdmin=u.role==='admin'||u.role==='sub_admin';
      document.getElementById('cmtForm').style.display='block';
      document.getElementById('cmtLogin').style.display='none';
      document.getElementById('cmtUser').innerHTML='<span class="cmt-avatar" style="background:'+hashColor(u.username||u.email)+'">'+esc(u.username||u.email)[0].toUpperCase()+'</span><span class="cmt-name">'+esc(u.username||u.email)+'</span>';
    }else{sLogin();}
  }).catch(function(){sLogin();});
  function sLogin(){document.getElementById('cmtForm').style.display='none';document.getElementById('cmtLogin').style.display='block';document.getElementById('cmtLoginLink').href=API+'/login?redirect='+encodeURIComponent(window.location.href);}

  loadCmts();
  document.getElementById('cmtInput').addEventListener('input',function(){document.getElementById('cmtChar').textContent=this.value.length;});
  document.getElementById('cmtSubmit').addEventListener('click',submitCmt);

  function loadCmts(){
    fetch(API+'/api/comments?url='+encodeURIComponent(pageUrl),{credentials:'include'}).then(function(r){return r.json();}).then(function(d){
      allComments=d.comments||[];
      var cnt=document.getElementById('cmtCount');
      cnt.textContent=allComments.length>0?allComments.length+' \u6761':'';
      renderCmts();
    }).catch(function(){document.getElementById('cmtList').innerHTML='<div class="cmt-empty"><p>\u8bc4\u8bba\u52a0\u8f7d\u5931\u8d25</p></div>';});
  }

  function renderCmts(){
    var list=document.getElementById('cmtList');
    if(allComments.length===0){list.innerHTML='<div class="cmt-empty"><div class="cmt-empty-icon">\uD83D\uDCAC</div><p>\u6682\u65E0\u8BC4\u8BBA\uFF0C\u6765\u8BF4\u4E24\u53E5\u5427</p></div>';return;}
    var roots=[],children={};
    allComments.forEach(function(c){if(c.parent_id){if(!children[c.parent_id])children[c.parent_id]=[];children[c.parent_id].push(c);}else{roots.push(c);}});
    // Sort roots by likes desc
    var sorted=roots.slice().sort(function(a,b){return(b.likes||0)-(a.likes||0);});
    var show=folded&&sorted.length>3?sorted.slice(0,3):sorted;
    var html='';
    show.forEach(function(c){html+=renderCmt(c,children);});
    if(folded&&sorted.length>3){html+='<button class="cmt-fold-btn" onclick="expandCmts()">\u5C55\u5F00\u5168\u90E8 '+sorted.length+' \u6761\u8BC4\u8BBA</button>';}
    else if(!folded&&sorted.length>3){html+='<button class="cmt-fold-btn" onclick="foldCmts()">\u6536\u8D77\u8BC4\u8BBA</button>';}
    list.innerHTML=html;
  }

  window.expandCmts=function(){folded=false;renderCmts();};
  window.foldCmts=function(){folded=true;renderCmts();};

  function renderCmt(c,ch){
    var t=new Date(c.created_at),ts=t.getFullYear()+'-'+pad(t.getMonth()+1)+'-'+pad(t.getDate())+' '+pad(t.getHours())+':'+pad(t.getMinutes());
    var ini=(c.user_name||'?')[0].toUpperCase(),col=hashColor(c.user_name||'?');
    var likes=c.likes||0;
    var likedBy=[];try{likedBy=JSON.parse(c.liked_by||'[]');}catch(e){}
    var isLiked=curUser&&likedBy.indexOf(curUser.email)!==-1;
    var likeBtn='<button class="cmt-act'+(isLiked?' liked':'')+'" onclick="likeCmt(\''+c.id+'\')">'+(isLiked?'\u2764':'\u2661')+' '+(likes>0?likes:'')+'</button>';
    var rplBtn=curUser?'<button class="cmt-act" onclick="setReply(\''+c.id+'\',\''+esc(c.user_name)+'\')">↩ \u56de\u590d</button>':'';
    var delBtn=isAdmin?'<button class="cmt-act" style="color:#ef4444" onclick="delCmt(\''+c.id+'\')">\u5220\u9664</button>':'';
    var h='<div class="cmt-item" id="c-'+c.id+'"><span class="cmt-avatar" style="background:'+col+'">'+esc(ini)+'</span><div class="cmt-main"><div class="cmt-meta"><span class="cmt-name">'+esc(c.user_name)+'</span><span class="cmt-time">'+ts+'</span></div><div class="cmt-bubble">'+esc(c.content)+'</div><div class="cmt-acts">'+likeBtn+rplBtn+delBtn+'</div>';
    if(ch[c.id]&&ch[c.id].length>0){h+='<div class="cmt-replies">';ch[c.id].forEach(function(r){h+=renderCmt(r,ch);});h+='</div>';}
    h+='</div></div>';
    return h;
  }

  function pad(n){return n<10?'0'+n:''+n;}
  function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):'';} 

  function postAPI(p,d){return fetch(API+p,{method:'POST',credentials:'include',headers:{'Content-Type':'text/plain'},body:JSON.stringify(d)}).then(function(r){return r.json();});}

  function submitCmt(){
    var input=document.getElementById('cmtInput'),content=input.value.trim();if(!content)return;
    var btn=document.getElementById('cmtSubmit');btn.disabled=true;btn.textContent='\u53d1\u9001\u4e2d...';
    postAPI('/api/comments',{url:pageUrl,content:content,parent_id:replyTo||''}).then(function(d){
      btn.disabled=false;btn.textContent='\u53d1\u9001';
      if(d.error){showAlert(d.error);}else{input.value='';document.getElementById('cmtChar').textContent='0';cancelReply();folded=false;loadCmts();}
    }).catch(function(){btn.disabled=false;btn.textContent='\u53d1\u9001';showAlert('\u53d1\u9001\u5931\u8d25');});
  }

  window.delCmt=function(id){if(!confirm('\u786e\u5b9a\u5220\u9664\uff1f'))return;postAPI('/api/comments/delete',{id:id}).then(function(d){if(d.ok)loadCmts();else showAlert(d.error||'\u5220\u9664\u5931\u8d25');});};
  window.likeCmt=function(id){postAPI('/api/comments/like',{id:id}).then(function(d){if(d.ok)loadCmts();else if(d.error)showAlert(d.error);});};

  window.setReply=function(id,name){
    replyTo=id;var input=document.getElementById('cmtInput');input.placeholder='\u56de\u590d '+name+'...';input.focus();
    var ex=document.getElementById('replyInd');if(ex)ex.remove();
    var ind=document.createElement('div');ind.id='replyInd';ind.className='reply-ind';
    ind.innerHTML='\u56de\u590d <b>'+esc(name)+'</b> <button onclick="cancelReply()">\u2715</button>';
    input.parentNode.insertBefore(ind,input);
  };
  window.cancelReply=function(){replyTo=null;document.getElementById('cmtInput').placeholder='\u5199\u4e0b\u4f60\u7684\u8bc4\u8bba...';var ex=document.getElementById('replyInd');if(ex)ex.remove();};
  function showAlert(msg){var el=document.getElementById('cmtAlert');el.textContent=msg;el.className='cmt-alert cmt-alert-error';el.style.display='block';setTimeout(function(){el.style.display='none';},3000);}
})();
</script>
{{ end }}
