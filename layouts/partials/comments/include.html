{{ if .Site.Params.comments.enabled }}
<link rel="stylesheet" href="/css/comments.css?v={{ now.Unix }}">

<section id="comments" class="article-comments">
  <div class="cmt-section">
    <div class="cmt-head">
      <h3 class="cmt-title">💬 评论</h3>
      <span class="cmt-count-badge" id="cmtCount"></span>
    </div>
    <div id="cmtActions">
      <button class="cmt-write-btn" id="cmtWriteBtn" style="display:none" onclick="toggleForm()">✏️ 写评论</button>
      <a class="cmt-login-link" id="cmtLoginLink" style="display:none">🔑 登录后评论</a>
    </div>

    <div class="cmt-form" id="cmtForm">
      <div class="cmt-form-top"><button type="button" class="cmt-form-close" onclick="toggleForm()">✕</button></div>
      <div class="cmt-field-wrap">
        <textarea id="cmtInput" class="cmt-textarea" maxlength="1000" rows="1"></textarea>
        <label class="cmt-float-label" for="cmtInput">说点什么...</label>
      </div>
      <div class="cmt-form-ft">
        <div class="cmt-form-tools">
          <button type="button" class="emoji-trigger" id="emojiBtn" title="表情">😀</button>
          <span class="cmt-char"><span id="cmtChar">0</span>/1000</span>
        </div>
        <button class="cmt-send" id="cmtSend">发送</button>
      </div>
      <div class="emoji-panel" id="emojiPanel"></div>
      <div id="cmtAlert" class="cmt-alert" style="display:none"></div>
    </div>

    <div class="cmt-sort-bar">
      <button class="cmt-sort-toggle" id="cmtMainSort" onclick="toggleMainSort()">☰ 按热度</button>
    </div>
    <div id="cmtList" class="cmt-list"><div class="cmt-loading">加载中...</div></div>
    <div id="cmtDetail" class="cmt-detail" style="display:none"></div>
  </div>
</section>

<script src="/js/comments-share.js?v={{ now.Unix }}" defer></script>
<script src="/js/comments.js?v={{ now.Unix }}" defer></script>
<script src="/js/comments-report.js?v={{ now.Unix }}" defer></script>
<script src="/js/comments-detail.js?v={{ now.Unix }}" defer></script>
{{ end }}
