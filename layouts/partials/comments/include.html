{{ if .Site.Params.comments.enabled }}
<style>
/* === Share (injected into .article-content) === */
.share-end{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--card-separator-color,#eee)}
.share-end p{font-size:1rem;color:var(--card-text-color-main);margin:0;flex:1}
.share-wrap{position:relative;flex-shrink:0}
.share-trigger{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.2rem;background:var(--accent-color,#667eea);color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:opacity .15s}
.share-trigger:hover{opacity:.85}
.share-dd{display:none;position:absolute;top:50%;right:calc(100% + 10px);transform:translateY(-50%);background:var(--card-background,#fff);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.12);padding:.5rem;min-width:160px;z-index:100}
.share-dd.show{display:block;animation:sdIn .12s ease}
@keyframes sdIn{from{opacity:0;transform:translateY(-50%) translateX(4px)}to{opacity:1;transform:translateY(-50%) translateX(0)}}
.share-dd a,.share-dd button{display:flex;align-items:center;gap:.5rem;width:100%;padding:.5rem .8rem;border:none;background:none;border-radius:6px;font-size:.95rem;color:var(--card-text-color-main,#333);text-decoration:none;cursor:pointer;transition:background .1s;white-space:nowrap}
.share-dd a:hover,.share-dd button:hover{background:var(--body-background,#f5f5f5)}

/* === Comment Section (card matching article style) === */
.cmt-section{padding:30px;background:var(--card-background);border-radius:var(--card-border-radius,10px);box-shadow:var(--shadow-l1)}
.cmt-head{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.cmt-title{font-size:1.25rem;font-weight:700;color:var(--card-text-color-main);margin:0}
.cmt-count-badge{font-size:.85rem;color:var(--card-text-color-tertiary);background:var(--body-background,#f5f5f5);padding:2px 10px;border-radius:12px}
/* Write comment button */
.cmt-write-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--accent-color,#667eea);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .15s;margin-bottom:5px}
.cmt-write-btn:hover{opacity:.85}
.cmt-login-link{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--accent-color,#667eea);color:#fff!important;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;text-decoration:none;transition:opacity .15s}
.cmt-login-link:hover{opacity:.85}
/* Comment form (hidden by default) */
.cmt-form{display:none;margin-top:15px;padding:20px;background:var(--body-background,#f9f9f9);border-radius:10px}
.cmt-form.show{display:block;animation:cmtSlide .2s ease}
@keyframes cmtSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.cmt-form-user{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:1rem;color:var(--card-text-color-secondary)}
.cmt-textarea{width:100%;padding:12px 16px;border:1.5px solid var(--card-separator-color,#e0e0e0);border-radius:10px;font-size:1rem;font-family:inherit;resize:vertical;min-height:100px;outline:none;transition:border-color .2s;background:var(--card-background,#fff);color:var(--card-text-color-main);box-sizing:border-box;line-height:1.6}
.cmt-textarea:focus{border-color:var(--accent-color,#667eea);box-shadow:0 0 0 3px rgba(102,126,234,.08)}
.cmt-form-ft{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.cmt-char{font-size:.85rem;color:var(--card-text-color-tertiary)}
.cmt-send{padding:8px 24px;background:var(--accent-color,#667eea);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .15s}
.cmt-send:hover{opacity:.85}
.cmt-send:disabled{opacity:.4;cursor:not-allowed}
.cmt-alert{padding:8px 14px;border-radius:8px;font-size:.9rem;margin-top:10px}
.cmt-alert-error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.reply-tag{font-size:.9rem;color:var(--card-text-color-secondary);margin-bottom:8px;padding:4px 10px;background:rgba(102,126,234,.06);border-radius:6px;display:inline-flex;align-items:center;gap:6px}
.reply-tag button{background:none;border:none;cursor:pointer;font-size:.9rem;color:var(--card-text-color-tertiary);padding:0 2px}
.reply-tag button:hover{color:#ef4444}
/* Comment list */
.cmt-list{margin-top:20px}
.cmt-empty{text-align:center;padding:40px 10px;color:var(--card-text-color-tertiary,#bbb)}
.cmt-empty-icon{font-size:2.5rem;margin-bottom:8px}
.cmt-empty p{font-size:1rem;margin:0}
.cmt-loading{text-align:center;padding:30px;color:var(--card-text-color-tertiary);font-size:1rem}
/* Single comment */
.c-item{display:flex;gap:12px;padding:16px 0}
.c-item+.c-item{border-top:1px solid var(--card-separator-color,#f0f0f0)}
.c-avatar{width:40px;height:40px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;flex-shrink:0}
.c-body{flex:1;min-width:0}
.c-meta{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.c-name{font-weight:600;font-size:1rem;color:var(--card-text-color-main)}
.c-time{font-size:.85rem;color:var(--card-text-color-tertiary);margin-left:auto}
.c-text{font-size:1rem;line-height:1.75;color:var(--card-text-color-main);white-space:pre-wrap;word-break:break-word;margin:4px 0 6px}
.c-actions{display:flex;align-items:center;gap:4px}
.c-btn{background:none;border:none;font-size:.9rem;cursor:pointer;padding:3px 8px;border-radius:4px;transition:all .12s;color:var(--card-text-color-tertiary,#999)}
.c-btn:hover{color:var(--accent-color,#667eea);background:rgba(102,126,234,.05)}
.c-btn.liked{color:#e74c3c}
.c-btn.del:hover{color:#ef4444}
/* Nested replies - subtle gray line */
.c-replies{margin-left:52px;position:relative}
.c-replies::before{content:'';position:absolute;left:-26px;top:0;bottom:0;width:1.5px;background:var(--card-separator-color,#e5e5e5)}
.c-replies .c-item{padding:12px 0}
.c-replies .c-avatar{width:32px;height:32px;font-size:.85rem}
.c-replies .c-text{font-size:.95rem}
/* Fold */
.cmt-more{background:none;border:1px dashed var(--card-separator-color,#ddd);padding:10px;border-radius:8px;width:100%;font-size:.95rem;color:var(--card-text-color-tertiary);cursor:pointer;margin-top:12px;transition:all .15s}
.cmt-more:hover{border-color:var(--accent-color,#667eea);color:var(--accent-color,#667eea)}
</style>

<!-- Share template (injected into article via JS) -->
<template id="shareTpl">
  <div class="share-end">
    <p>如果你喜欢这篇文章，请分享给更多人 ❤️</p>
    <div class="share-wrap">
      <button class="share-trigger" onclick="toggleShare()">↗ 分享</button>
      <div class="share-dd" id="shareDD">
        <a id="sTwitter" target="_blank" rel="noopener">𝕏 Twitter</a>
        <a id="sWeibo" target="_blank" rel="noopener">🔴 微博</a>
        <a id="sQQ" target="_blank" rel="noopener">🔵 QQ</a>
        <button id="sCopy">🔗 复制链接</button>
      </div>
    </div>
  </div>
</template>

<section id="comments" class="article-comments">
  <div class="cmt-section">
    <div class="cmt-head">
      <h3 class="cmt-title">💬 评论</h3>
      <span class="cmt-count-badge" id="cmtCount"></span>
    </div>

    <!-- Write button or Login button -->
    <div id="cmtActions">
      <button class="cmt-write-btn" id="cmtWriteBtn" style="display:none" onclick="toggleForm()">✏️ 写评论</button>
      <a class="cmt-login-link" id="cmtLoginLink" style="display:none">🔑 登录后评论</a>
    </div>

    <!-- Form (hidden, shown on click) -->
    <div class="cmt-form" id="cmtForm">
      <div class="cmt-form-user" id="cmtUser"></div>
      <textarea id="cmtInput" class="cmt-textarea" placeholder="写下你的评论..." maxlength="1000" rows="3"></textarea>
      <div class="cmt-form-ft">
        <span class="cmt-char"><span id="cmtChar">0</span>/1000</span>
        <button class="cmt-send" id="cmtSend">发送</button>
      </div>
      <div id="cmtAlert" class="cmt-alert" style="display:none"></div>
    </div>

    <!-- Comment list -->
    <div id="cmtList" class="cmt-list"><div class="cmt-loading">加载中...</div></div>
  </div>
</section>

<script>
(function(){
  var API='https://auth.liliwiki.com', pageUrl=window.location.pathname;
  var curUser=null, isAdmin=false, replyTo=null, allComments=[], folded=true;
  var COLORS=['#667eea','#764ba2','#e74c3c','#2ecc71','#f39c12','#1abc9c','#e91e63','#9b59b6','#3498db','#e67e22'];
  function hc(s){var h=0;for(var i=0;i<s.length;i++){h=s.charCodeAt(i)+((h<<5)-h);}return COLORS[Math.abs(h)%COLORS.length];}

  // === Share: inject into article ===
  var tpl=document.getElementById('shareTpl');
  var ac=document.querySelector('.article-content')||document.querySelector('article');
  if(tpl&&ac) ac.appendChild(tpl.content.cloneNode(true));
  var et=encodeURIComponent(document.title), eu=encodeURIComponent(window.location.href);
  var sT=document.getElementById('sTwitter'), sW=document.getElementById('sWeibo'), sQ=document.getElementById('sQQ');
  if(sT) sT.href='https://twitter.com/intent/tweet?text='+et+'&url='+eu;
  if(sW) sW.href='https://service.weibo.com/share/share.php?title='+et+'&url='+eu;
  if(sQ) sQ.href='https://connect.qq.com/widget/shareqq/index.html?title='+et+'&url='+eu;
  window.toggleShare=function(){var d=document.getElementById('shareDD');if(d)d.classList.toggle('show');};
  document.addEventListener('click',function(e){if(!e.target.closest('.share-wrap')){var d=document.getElementById('shareDD');if(d)d.classList.remove('show');}});
  var cb=document.getElementById('sCopy');
  if(cb) cb.onclick=function(e){e.stopPropagation();var b=this;navigator.clipboard.writeText(window.location.href).then(function(){b.textContent='\u2713 \u5df2\u590d\u5236';setTimeout(function(){b.textContent='\uD83D\uDD17 \u590d\u5236\u94fe\u63a5';},2000);});};

  // === Auth ===
  fetch(API+'/api/me',{credentials:'include'}).then(function(r){return r.json();}).then(function(d){
    var u=d.user||d;
    if(u&&u.email){
      curUser=u; isAdmin=u.role==='admin'||u.role==='sub_admin';
      document.getElementById('cmtWriteBtn').style.display='';
      document.getElementById('cmtLoginLink').style.display='none';
      document.getElementById('cmtUser').innerHTML='<span class="c-avatar" style="background:'+hc(u.username||u.email)+'">'+esc(u.username||u.email)[0].toUpperCase()+'</span><span class="c-name">'+esc(u.username||u.email)+'</span>';
    } else { doLogin(); }
  }).catch(function(){ doLogin(); });

  function doLogin(){
    document.getElementById('cmtWriteBtn').style.display='none';
    document.getElementById('cmtLoginLink').style.display='';
    document.getElementById('cmtLoginLink').href=API+'/login?redirect='+encodeURIComponent(window.location.href);
  }

  // === Toggle form ===
  window.toggleForm=function(){
    var f=document.getElementById('cmtForm');
    f.classList.toggle('show');
    if(f.classList.contains('show')) document.getElementById('cmtInput').focus();
  };

  // === Load & render comments ===
  loadCmts();
  document.getElementById('cmtInput').addEventListener('input',function(){document.getElementById('cmtChar').textContent=this.value.length;});
  document.getElementById('cmtSend').addEventListener('click',submitCmt);

  function loadCmts(){
    fetch(API+'/api/comments?url='+encodeURIComponent(pageUrl),{credentials:'include'}).then(function(r){return r.json();}).then(function(d){
      allComments=d.comments||[];
      var badge=document.getElementById('cmtCount');
      badge.textContent=allComments.length>0?allComments.length+' \u6761':'';
      renderList();
    }).catch(function(){document.getElementById('cmtList').innerHTML='<div class="cmt-empty"><p>\u8bc4\u8bba\u52a0\u8f7d\u5931\u8d25</p></div>';});
  }

  function renderList(){
    var el=document.getElementById('cmtList');
    if(!allComments.length){el.innerHTML='<div class="cmt-empty"><div class="cmt-empty-icon">\uD83D\uDCAC</div><p>\u6682\u65e0\u8bc4\u8bba\uff0c\u6765\u8bf4\u4e24\u53e5\u5427</p></div>';return;}
    var roots=[], kids={};
    allComments.forEach(function(c){if(c.parent_id){if(!kids[c.parent_id])kids[c.parent_id]=[];kids[c.parent_id].push(c);}else roots.push(c);});
    var sorted=roots.slice().sort(function(a,b){return(b.likes||0)-(a.likes||0);});
    var show=folded&&sorted.length>3?sorted.slice(0,3):sorted;
    var h='';
    show.forEach(function(c){h+=renderC(c,kids);});
    if(folded&&sorted.length>3) h+='<button class="cmt-more" onclick="expandCmts()">\u5c55\u5f00\u5168\u90e8 '+sorted.length+' \u6761\u8bc4\u8bba</button>';
    else if(!folded&&sorted.length>3) h+='<button class="cmt-more" onclick="foldCmts()">\u6536\u8d77\u8bc4\u8bba</button>';
    el.innerHTML=h;
  }
  window.expandCmts=function(){folded=false;renderList();};
  window.foldCmts=function(){folded=true;renderList();};

  function renderC(c,kids){
    var d=new Date(c.created_at);
    var ts=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
    var ini=(c.user_name||'?')[0].toUpperCase(), col=hc(c.user_name||'?');
    var lk=c.likes||0, lb=[];try{lb=JSON.parse(c.liked_by||'[]');}catch(e){}
    var liked=curUser&&lb.indexOf(curUser.email)!==-1;
    var likeH='<button class="c-btn'+(liked?' liked':'')+'" onclick="likeCmt(\''+c.id+'\')">'+(liked?'\u2764':'\u2661')+(lk?' '+lk:'')+'</button>';
    var replyH=curUser?'<button class="c-btn" onclick="replyTo(\''+c.id+'\',\''+esc(c.user_name)+'\')">↩ \u56de\u590d</button>':'';
    var delH=isAdmin?'<button class="c-btn del" onclick="delCmt(\''+c.id+'\')">\u5220\u9664</button>':'';
    var html='<div class="c-item" id="c-'+c.id+'"><span class="c-avatar" style="background:'+col+'">'+esc(ini)+'</span><div class="c-body"><div class="c-meta"><span class="c-name">'+esc(c.user_name)+'</span><span class="c-time">'+ts+'</span></div><div class="c-text">'+esc(c.content)+'</div><div class="c-actions">'+likeH+replyH+delH+'</div>';
    if(kids[c.id]&&kids[c.id].length){html+='<div class="c-replies">';kids[c.id].forEach(function(r){html+=renderC(r,kids);});html+='</div>';}
    html+='</div></div>';
    return html;
  }

  function pad(n){return n<10?'0'+n:''+n;}
  function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):'';}
  function postAPI(p,d){return fetch(API+p,{method:'POST',credentials:'include',headers:{'Content-Type':'text/plain'},body:JSON.stringify(d)}).then(function(r){return r.json();});}

  function submitCmt(){
    var input=document.getElementById('cmtInput'), content=input.value.trim();
    if(!content) return;
    var btn=document.getElementById('cmtSend');
    btn.disabled=true; btn.textContent='\u53d1\u9001\u4e2d...';
    postAPI('/api/comments',{url:pageUrl,content:content,parent_id:replyTo||''}).then(function(d){
      btn.disabled=false; btn.textContent='\u53d1\u9001';
      if(d.error){showAlert(d.error);}
      else{input.value='';document.getElementById('cmtChar').textContent='0';cancelReply();folded=false;loadCmts();}
    }).catch(function(){btn.disabled=false;btn.textContent='\u53d1\u9001';showAlert('\u53d1\u9001\u5931\u8d25');});
  }

  window.delCmt=function(id){if(!confirm('\u786e\u5b9a\u5220\u9664\uff1f'))return;postAPI('/api/comments/delete',{id:id}).then(function(d){if(d.ok)loadCmts();else showAlert(d.error||'\u5220\u9664\u5931\u8d25');});};
  window.likeCmt=function(id){postAPI('/api/comments/like',{id:id}).then(function(d){if(d.ok)loadCmts();else if(d.error)showAlert(d.error);});};

  window.replyTo=function(id,name){
    replyTo=id;
    var f=document.getElementById('cmtForm');
    if(!f.classList.contains('show')) f.classList.add('show');
    var input=document.getElementById('cmtInput');
    input.placeholder='\u56de\u590d '+name+'...';
    input.focus();
    var ex=document.getElementById('replyTag');if(ex)ex.remove();
    var tag=document.createElement('div');tag.id='replyTag';tag.className='reply-tag';
    tag.innerHTML='\u56de\u590d <b>'+esc(name)+'</b> <button onclick="cancelReply()">\u2715</button>';
    input.parentNode.insertBefore(tag,input);
  };
  window.cancelReply=function(){replyTo=null;document.getElementById('cmtInput').placeholder='\u5199\u4e0b\u4f60\u7684\u8bc4\u8bba...';var ex=document.getElementById('replyTag');if(ex)ex.remove();};
  function showAlert(msg){var el=document.getElementById('cmtAlert');el.textContent=msg;el.className='cmt-alert cmt-alert-error';el.style.display='block';setTimeout(function(){el.style.display='none';},3000);}
})();
</script>
{{ end }}
