{{ if .Site.Params.comments.enabled }}
<style>
.article-share{margin:0 0 1.5rem;padding:1.2rem;background:var(--card-background);border-radius:var(--card-border-radius,10px);box-shadow:var(--shadow-l1)}
.share-label{font-size:.9rem;font-weight:600;color:var(--card-text-color-main);margin-bottom:.6rem;display:block}
.share-buttons{display:flex;gap:.5rem;flex-wrap:wrap}
.share-btn{display:inline-flex;align-items:center;padding:.4rem .9rem;border-radius:6px;font-size:.82rem;font-weight:500;text-decoration:none;border:1px solid var(--card-separator-color,#eee);color:var(--card-text-color-secondary,#666);background:transparent;cursor:pointer;transition:all .15s}
.share-btn:hover{border-color:var(--accent-color,#667eea);color:var(--accent-color,#667eea)}
.share-twitter:hover{border-color:#1da1f2;color:#1da1f2}
.share-weibo:hover{border-color:#e6162d;color:#e6162d}
.share-qq:hover{border-color:#12b7f5;color:#12b7f5}
.comment-section{padding:1.5rem;background:var(--card-background);border-radius:var(--card-border-radius,10px);box-shadow:var(--shadow-l1)}
.comment-title{font-size:1.1rem;font-weight:600;color:var(--card-text-color-main);margin-bottom:1rem}
.comment-textarea{width:100%;padding:.7rem;border:1.5px solid var(--card-separator-color,#e0e0e0);border-radius:8px;font-size:.9rem;font-family:inherit;resize:vertical;min-height:80px;outline:none;transition:border-color .2s;background:var(--body-background,#fff);color:var(--card-text-color-main)}
.comment-textarea:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.12)}
.comment-form-footer{display:flex;justify-content:space-between;align-items:center;margin-top:.5rem}
.comment-char-count{font-size:.78rem;color:var(--card-text-color-tertiary,#999)}
.comment-submit{padding:.45rem 1.2rem;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s}
.comment-submit:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(102,126,234,.3)}
.comment-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.comment-user-info{display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem;font-size:.85rem;color:var(--card-text-color-secondary)}
.comment-login-prompt{text-align:center;padding:1.5rem;color:var(--card-text-color-secondary,#888)}
.comment-login-prompt p{margin-bottom:.8rem;font-size:.9rem}
.comment-login-btn{display:inline-block;padding:.5rem 1.5rem;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff!important;border-radius:8px;text-decoration:none;font-size:.85rem;font-weight:600;transition:transform .15s}
.comment-login-btn:hover{transform:translateY(-1px)}
.comment-list{margin-top:1rem}
.comment-empty{text-align:center;padding:1.5rem;color:var(--card-text-color-tertiary,#aaa);font-size:.88rem}
.comment-loading{text-align:center;padding:1rem;color:var(--card-text-color-tertiary,#aaa);font-size:.85rem}
.comment-item{padding:.8rem 0;border-bottom:1px solid var(--card-separator-color,#f0f0f0)}
.comment-item:last-child{border-bottom:none}
.comment-reply{margin-left:2rem;padding-left:.8rem;border-left:2px solid var(--card-separator-color,#e8e8e8)}
.comment-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem}
.comment-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;flex-shrink:0}
.comment-username{font-weight:600;font-size:.85rem;color:var(--card-text-color-main)}
.comment-time{font-size:.75rem;color:var(--card-text-color-tertiary,#aaa);margin-left:auto}
.comment-body{font-size:.9rem;line-height:1.6;color:var(--card-text-color-main);white-space:pre-wrap;word-break:break-word;padding-left:2.2rem}
.comment-actions{padding-left:2.2rem;margin-top:.3rem}
.comment-reply-btn,.comment-delete{background:none;border:none;font-size:.75rem;cursor:pointer;padding:.15rem .4rem;border-radius:4px;transition:all .15s}
.comment-reply-btn{color:var(--card-text-color-tertiary,#999)}
.comment-reply-btn:hover{color:#667eea;background:rgba(102,126,234,.08)}
.comment-delete{color:#ef4444}
.comment-delete:hover{background:rgba(239,68,68,.08)}
.reply-indicator{font-size:.82rem;color:var(--card-text-color-secondary);margin-bottom:.4rem;padding:.3rem .6rem;background:rgba(102,126,234,.06);border-radius:6px;display:inline-flex;align-items:center;gap:.3rem}
.reply-cancel{background:none;border:none;cursor:pointer;font-size:.8rem;color:var(--card-text-color-tertiary);padding:0 .2rem}
.reply-cancel:hover{color:#ef4444}
.comment-alert{padding:.5rem .8rem;border-radius:6px;font-size:.82rem;margin-top:.5rem}
.comment-alert-error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
</style>
<section id="comments" class="article-comments">
  <!-- Share buttons -->
  <div class="article-share" id="shareSection">
    <span class="share-label">分享本文</span>
    <div class="share-buttons">
      <a id="shareTwitter" target="_blank" rel="noopener" class="share-btn share-twitter">X</a>
      <a id="shareWeibo" target="_blank" rel="noopener" class="share-btn share-weibo">微博</a>
      <a id="shareQQ" target="_blank" rel="noopener" class="share-btn share-qq">QQ</a>
      <button class="share-btn share-copy" id="shareCopyBtn">复制链接</button>
    </div>
  </div>

  <!-- Comment section -->
  <div class="comment-section">
    <h3 class="comment-title">💬 评论</h3>

    <!-- Comment form (shown when logged in) -->
    <div id="commentForm" style="display:none">
      <div class="comment-user-info" id="commentUserInfo"></div>
      <textarea id="commentInput" class="comment-textarea" placeholder="写下你的评论..." maxlength="1000" rows="3"></textarea>
      <div class="comment-form-footer">
        <span class="comment-char-count"><span id="charCount">0</span>/1000</span>
        <button class="comment-submit" id="commentSubmit" onclick="submitComment()">发送</button>
      </div>
      <div id="commentAlert" class="comment-alert" style="display:none"></div>
    </div>

    <!-- Login prompt (shown when not logged in) -->
    <div id="loginPrompt" style="display:none" class="comment-login-prompt">
      <p>登录后即可评论</p>
      <a id="loginLink" class="comment-login-btn">登录 / 注册</a>
    </div>

    <!-- Comment list -->
    <div id="commentList" class="comment-list">
      <div class="comment-loading">加载中...</div>
    </div>
  </div>
</section>

<script>
(function() {
  var API = 'https://auth.liliwiki.com';
  var pageUrl = window.location.pathname;
  var currentUser = null;
  var isAdmin = false;
  var replyTo = null;

  // Init share buttons
  var t = encodeURIComponent(document.title);
  var u = encodeURIComponent(window.location.href);
  document.getElementById('shareTwitter').href = 'https://twitter.com/intent/tweet?text=' + t + '&url=' + u;
  document.getElementById('shareWeibo').href = 'https://service.weibo.com/share/share.php?title=' + t + '&url=' + u;
  document.getElementById('shareQQ').href = 'https://connect.qq.com/widget/shareqq/index.html?title=' + t + '&url=' + u;
  document.getElementById('shareCopyBtn').addEventListener('click', function() {
    var btn = this;
    navigator.clipboard.writeText(window.location.href).then(function() {
      btn.textContent = '已复制 ✓';
      setTimeout(function() { btn.textContent = '复制链接'; }, 2000);
    });
  });

  // Check login status
  fetch(API + '/api/me', { credentials: 'include' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var u = data.user || data;
      if (u && u.email) {
        currentUser = u;
        isAdmin = u.role === 'admin' || u.role === 'sub_admin';
        document.getElementById('commentForm').style.display = 'block';
        document.getElementById('loginPrompt').style.display = 'none';
        document.getElementById('commentUserInfo').innerHTML =
          '<span class="comment-avatar">' + escapeH(u.username || u.email)[0].toUpperCase() + '</span>' +
          '<span class="comment-username">' + escapeH(u.username || u.email) + '</span>';
      } else {
        document.getElementById('commentForm').style.display = 'none';
        document.getElementById('loginPrompt').style.display = 'block';
        document.getElementById('loginLink').href = API + '/login?redirect=' + encodeURIComponent(window.location.href);
      }
    })
    .catch(function() {
      document.getElementById('commentForm').style.display = 'none';
      document.getElementById('loginPrompt').style.display = 'block';
      document.getElementById('loginLink').href = API + '/login?redirect=' + encodeURIComponent(window.location.href);
    });

  // Load comments
  loadComments();

  // Char counter
  document.getElementById('commentInput').addEventListener('input', function() {
    document.getElementById('charCount').textContent = this.value.length;
  });

  function loadComments() {
    fetch(API + '/api/comments?url=' + encodeURIComponent(pageUrl), { credentials: 'include' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var list = document.getElementById('commentList');
        var comments = data.comments || [];
        if (comments.length === 0) {
          list.innerHTML = '<div class="comment-empty">暂无评论，来说两句吧</div>';
          return;
        }
        // Build tree
        var roots = [];
        var children = {};
        comments.forEach(function(c) {
          if (c.parent_id) {
            if (!children[c.parent_id]) children[c.parent_id] = [];
            children[c.parent_id].push(c);
          } else {
            roots.push(c);
          }
        });
        var html = '';
        roots.forEach(function(c) {
          html += renderComment(c, children, 0);
        });
        list.innerHTML = html;
      })
      .catch(function() {
        document.getElementById('commentList').innerHTML = '<div class="comment-empty">评论加载失败</div>';
      });
  }

  function renderComment(c, children, depth) {
    var time = new Date(c.created_at);
    var timeStr = time.getFullYear() + '-' + pad(time.getMonth()+1) + '-' + pad(time.getDate()) + ' ' + pad(time.getHours()) + ':' + pad(time.getMinutes());
    var initial = (c.user_name || '?')[0].toUpperCase();
    var depthClass = depth > 0 ? ' comment-reply' : '';
    var adminBadge = '';
    var deleteBtn = isAdmin ? '<button class="comment-delete" onclick="deleteComment(\'' + c.id + '\')">删除</button>' : '';
    var replyBtn = currentUser ? '<button class="comment-reply-btn" onclick="setReply(\'' + c.id + '\', \'' + escapeH(c.user_name) + '\')">回复</button>' : '';

    var html = '<div class="comment-item' + depthClass + '" id="comment-' + c.id + '">' +
      '<div class="comment-header">' +
        '<span class="comment-avatar">' + escapeH(initial) + '</span>' +
        '<span class="comment-username">' + escapeH(c.user_name) + '</span>' + adminBadge +
        '<span class="comment-time">' + timeStr + '</span>' +
      '</div>' +
      '<div class="comment-body">' + escapeH(c.content) + '</div>' +
      '<div class="comment-actions">' + replyBtn + deleteBtn + '</div>' +
    '</div>';

    if (children[c.id]) {
      children[c.id].forEach(function(child) {
        html += renderComment(child, children, depth + 1);
      });
    }
    return html;
  }

  function pad(n) { return n < 10 ? '0' + n : '' + n; }
  function escapeH(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  window.submitComment = function() {
    var input = document.getElementById('commentInput');
    var content = input.value.trim();
    if (!content) return;

    var btn = document.getElementById('commentSubmit');
    btn.disabled = true;
    btn.textContent = '发送中...';

    fetch(API + '/api/comments', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: pageUrl, content: content, parent_id: replyTo || '' })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      btn.disabled = false;
      btn.textContent = '发送';
      if (data.error) {
        showAlert(data.error, 'error');
      } else {
        input.value = '';
        document.getElementById('charCount').textContent = '0';
        cancelReply();
        loadComments();
      }
    })
    .catch(function() {
      btn.disabled = false;
      btn.textContent = '发送';
      showAlert('发送失败，请重试', 'error');
    });
  };

  window.deleteComment = function(id) {
    if (!confirm('确定删除这条评论？')) return;
    fetch(API + '/api/comments/delete', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: id })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok) loadComments();
      else showAlert(data.error || '删除失败', 'error');
    });
  };

  window.setReply = function(id, name) {
    replyTo = id;
    var input = document.getElementById('commentInput');
    input.placeholder = '回复 ' + name + '...';
    input.focus();
    var existing = document.getElementById('replyIndicator');
    if (existing) existing.remove();
    var indicator = document.createElement('div');
    indicator.id = 'replyIndicator';
    indicator.className = 'reply-indicator';
    indicator.innerHTML = '回复 <b>' + escapeH(name) + '</b> <button onclick="cancelReply()" class="reply-cancel">✕</button>';
    input.parentNode.insertBefore(indicator, input);
  };

  window.cancelReply = function() {
    replyTo = null;
    document.getElementById('commentInput').placeholder = '写下你的评论...';
    var existing = document.getElementById('replyIndicator');
    if (existing) existing.remove();
  };

  function showAlert(msg, type) {
    var el = document.getElementById('commentAlert');
    el.textContent = msg;
    el.className = 'comment-alert comment-alert-' + type;
    el.style.display = 'block';
    setTimeout(function() { el.style.display = 'none'; }, 3000);
  }
})();
</script>
{{ end }}
